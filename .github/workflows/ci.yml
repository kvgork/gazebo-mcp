name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install package + dev extras without ROS2 (rclpy is provided by the system)
          pip install -e ".[dev]" || pip install ruff mypy black pydantic pyyaml

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Black (format check)
        run: black --check src tests
        continue-on-error: true

      - name: Mypy (type check)
        # ROS imports are unavailable in CI; ignore_missing_imports is set in pyproject.toml
        run: mypy src/gazebo_mcp || true
