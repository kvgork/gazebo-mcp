[pytest]
# Pytest configuration for Gazebo MCP

# Test discovery patterns:
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options:
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers:
markers =
    ros2: Tests that require ROS2 to be sourced
    gazebo: Tests that require Gazebo to be running
    slow: Tests that take more than 1 second

# Test paths:
testpaths = tests

# Coverage options (if pytest-cov is installed):
# --cov=gazebo_mcp
# --cov-report=html
# --cov-report=term-missing
