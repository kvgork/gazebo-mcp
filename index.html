<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<title>Gazebo MCP Server</title>
		<link rel="stylesheet" href="style.css" />
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<style>
			body {
				max-width: 1200px;
				margin: 0 auto;
				padding: 20px;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				line-height: 1.6;
				color: #333;
			}
			#readme-content {
				background: white;
				padding: 30px;
				border-radius: 8px;
				box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			}
			#readme-content h1 {
				border-bottom: 2px solid #eee;
				padding-bottom: 10px;
			}
			#readme-content h2 {
				margin-top: 30px;
				border-bottom: 1px solid #eee;
				padding-bottom: 8px;
			}
			#readme-content pre {
				background: #f6f8fa;
				padding: 16px;
				border-radius: 6px;
				overflow-x: auto;
			}
			#readme-content code {
				background: #f6f8fa;
				padding: 2px 6px;
				border-radius: 3px;
				font-family: 'Monaco', 'Courier New', monospace;
			}
			#readme-content pre code {
				background: none;
				padding: 0;
			}
			#readme-content table {
				border-collapse: collapse;
				width: 100%;
				margin: 20px 0;
			}
			#readme-content table th,
			#readme-content table td {
				border: 1px solid #ddd;
				padding: 12px;
				text-align: left;
			}
			#readme-content table th {
				background: #f6f8fa;
				font-weight: 600;
			}
			#readme-content img {
				max-width: 100%;
			}
			#readme-content a {
				color: #0366d6;
				text-decoration: none;
			}
			#readme-content a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div id="readme-content"></div>
		<script>
			// Fetch and display README.md
			fetch('README.md')
				.then(response => response.text())
				.then(text => {
					// Strip YAML frontmatter (between --- markers)
					const content = text.replace(/^---\n[\s\S]*?\n---\n/, '');
					// Render the markdown
					document.getElementById('readme-content').innerHTML = marked.parse(content);
				})
				.catch(error => {
					document.getElementById('readme-content').innerHTML =
						'<p>Error loading README.md: ' + error.message + '</p>';
				});
		</script>
	</body>
</html>
